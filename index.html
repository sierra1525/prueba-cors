<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Prueba CORS</title>

<style>
body{
    font-family:Arial;
    margin:40px;
}

button{
    padding:12px 20px;
    margin-right:15px;
    cursor:pointer;
}

pre{
    margin-top:20px;
    background:#eee;
    padding:15px;
    white-space:pre-wrap;
}
</style>

</head>

<body>

<h2>Prueba de CORS</h2>

<button onclick="sinCors()">
Probar SIN CORS
</button>

<button onclick="conCors()">
Probar CON CORS
</button>

<pre id="resultado"></pre>

<script>

const endpoint =
"https://public-api.wordpress.com/rest/v1/me/";

const proxy =
"https://test-cors.globalgw.com:9443/";

const salida = document.getElementById("resultado");

async function ejecutar(url){

    salida.textContent="Consultando...\n\n"+url;

    try{

        const respuesta = await fetch(url);

        salida.textContent +=
            "\n\nSTATUS: "+respuesta.status+
            "\nOK: "+respuesta.ok;

        const texto = await respuesta.text();

        salida.textContent +=
            "\n\nRESPUESTA:\n\n"+texto;

    }
    catch(e){

        console.error(e);

        salida.textContent +=
            "\n\nERROR:\n\n"+
            e;

    }

}

function sinCors(){

    ejecutar(endpoint);

}

function conCors(){

    ejecutar(proxy + endpoint);

}

</script>

</body>
</html>
