<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Prueba CORS</title>
</head>

<body>

<h2>Prueba SIN CORS</h2>

<button onclick="probar()">
Probar API
</button>

<pre id="salida"></pre>

<script>

async function probar(){

    const salida = document.getElementById("salida");

    try{

        const r = await fetch(
            "https://test-cors.globalgw.com:5443/api"
        );

        const txt = await r.text();

        salida.textContent = txt;

    }catch(e){

        salida.textContent = e;

        console.error(e);

    }

}

</script>

</body>
</html>
