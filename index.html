<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Prueba Proxy CORS</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    margin:40px;
}

button{
    padding:10px 20px;
    margin:10px;
    cursor:pointer;
}

pre{
    background:#f5f5f5;
    border:1px solid #ccc;
    padding:15px;
    white-space:pre-wrap;
    max-height:600px;
    overflow:auto;
}
</style>

</head>
<body>

<h2>Prueba Proxy CORS</h2>

<button onclick="conCors()">Probar CON CORS</button>

<button onclick="sinCors()">Probar SIN CORS</button>

<h3>Resultado</h3>

<pre id="resultado">Esperando...</pre>

<script>

const endpoint =
"http://terpelservices.globalgw.com:8080/terpel-services-v2/places/map?categories=estacion_terpel.rumbo.urbana&categories=estacion_terpel.rumbo.rural&categories=estacion_terpel.rumbo.troncal";

const proxy =
"https://test-cors.globalgw.com:9443/";

const headers = {
    "apiKey":"a93c14d535e718c2b1ab0a5ed8573fba",
    "mgToken":"Vo5LDyGJ1dlyC2lGmv8cl3711Kj9A8PMEk3jcPG+J5w=",
    "Mg-Protocol":"200"
};

async function ejecutar(url){

    resultado.textContent="Consultando...";

    console.clear();

    console.log("====================================");
    console.log("URL:");
    console.log(url);
    console.log("====================================");

    try{

        const respuesta = await fetch(url,{
            headers:headers
        });

        console.log("STATUS:",respuesta.status);
        console.log("OK:",respuesta.ok);

        const texto = await respuesta.text();

        console.log("RESPUESTA:");
        console.log(texto);

        try{

            const json = JSON.parse(texto);

            resultado.textContent =
JSON.stringify(json,null,2);

        }

        catch(e){

            resultado.textContent =
texto;

        }

    }

    catch(e){

        console.error(e);

        resultado.textContent=e;

    }

}

function conCors(){

    ejecutar(proxy + endpoint);

}

function sinCors(){

    ejecutar(endpoint);

}

</script>

</body>
</html>
